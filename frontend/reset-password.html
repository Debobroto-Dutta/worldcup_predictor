<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - World Cup 2026 Predictor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .content {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .hidden {
            display: none;
        }

        .loading {
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔒 Reset Password</h1>
            <p>Enter your new password</p>
        </header>

        <div class="content">
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Verifying reset link...</p>
            </div>

            <div id="reset-form-container" class="hidden">
                <div id="message-area"></div>

                <div id="user-info" class="alert alert-info hidden">
                    <strong>Resetting password for:</strong> <span id="username-display"></span>
                </div>

                <form id="reset-form">
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" id="new-password" required minlength="6">
                        <small style="color: #666;">Minimum 6 characters</small>
                    </div>

                    <div class="form-group">
                        <label>Confirm New Password</label>
                        <input type="password" id="confirm-password" required minlength="6">
                    </div>

                    <button type="submit" class="btn" id="submit-btn">Reset Password</button>
                </form>

                <div class="back-link">
                    <a href="index.html">← Back to Login</a>
                </div>
            </div>

            <div id="error-container" class="hidden">
                <div class="alert alert-error">
                    <strong>Error:</strong> <span id="error-message"></span>
                </div>
                <div class="back-link">
                    <a href="index.html">← Back to Login</a>
                </div>
            </div>

            <div id="success-container" class="hidden">
                <div class="alert alert-success">
                    <strong>Success!</strong> Your password has been reset successfully.
                </div>
                <p style="text-align: center; margin-top: 20px;">
                    <a href="index.html" class="btn">Go to Login</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5000/api';
        let resetToken = null;

        function showMessage(message, isError = false) {
            const messageArea = document.getElementById('message-area');
            messageArea.innerHTML = `<div class="alert ${isError ? 'alert-error' : 'alert-success'}">${message}</div>`;
            setTimeout(() => {
                messageArea.innerHTML = '';
            }, 5000);
        }

        function showError(message) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('reset-form-container').classList.add('hidden');
            document.getElementById('error-message').textContent = message;
            document.getElementById('error-container').classList.remove('hidden');
        }

        function showSuccess() {
            document.getElementById('reset-form-container').classList.add('hidden');
            document.getElementById('success-container').classList.remove('hidden');
        }

        async function verifyToken() {
            // Get token from URL
            const urlParams = new URLSearchParams(window.location.search);
            resetToken = urlParams.get('token');

            if (!resetToken) {
                showError('No reset token provided. Please use the link from your email.');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/verify-reset-token`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ token: resetToken })
                });

                const data = await response.json();

                if (response.ok) {
                    // Token is valid, show form
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('reset-form-container').classList.remove('hidden');
                    document.getElementById('username-display').textContent = data.username;
                    document.getElementById('user-info').classList.remove('hidden');
                } else {
                    showError(data.error || 'Invalid or expired reset link');
                }
            } catch (error) {
                console.error('Error verifying token:', error);
                showError('Network error. Please try again.');
            }
        }

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (newPassword !== confirmPassword) {
                showMessage('Passwords do not match', true);
                return;
            }

            if (newPassword.length < 6) {
                showMessage('Password must be at least 6 characters', true);
                return;
            }

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Resetting...';

            try {
                const response = await fetch(`${API_BASE_URL}/reset-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        token: resetToken,
                        new_password: newPassword
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess();
                } else {
                    showMessage(data.error || 'Failed to reset password', true);
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Reset Password';
                }
            } catch (error) {
                console.error('Error resetting password:', error);
                showMessage('Network error. Please try again.', true);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
            }
        });

        // Verify token on page load
        verifyToken();
    </script>
</body>
</html>
