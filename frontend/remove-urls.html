<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remove URLs from Past Matches - Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 200px;
        }

        .btn-check {
            background: #3b82f6;
            color: white;
        }

        .btn-check:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3);
        }

        .btn-remove {
            background: #ef4444;
            color: white;
        }

        .btn-remove:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.3);
        }

        .btn-back {
            background: #6b7280;
            color: white;
        }

        .btn-back:hover {
            background: #4b5563;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .status {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .status.info {
            background: #dbeafe;
            color: #1e40af;
            border-left: 4px solid #3b82f6;
        }

        .status.success {
            background: #dcfce7;
            color: #166534;
            border-left: 4px solid #22c55e;
        }

        .status.error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }

        .status.warning {
            background: #fef3c7;
            color: #92400e;
            border-left: 4px solid #f59e0b;
        }

        .matches-list {
            margin-top: 20px;
        }

        .match-card {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .match-header {
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .match-details {
            font-size: 14px;
            color: #6b7280;
            line-height: 1.6;
        }

        .match-url {
            color: #3b82f6;
            word-break: break-all;
            font-family: monospace;
            font-size: 12px;
            background: #eff6ff;
            padding: 4px 8px;
            border-radius: 4px;
            margin-top: 5px;
            display: inline-block;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗑️ Remove URLs from Past Matches</h1>
        <p class="subtitle">Admin Tool - Remove streaming URLs from finished matches</p>

        <div id="status" class="status"></div>

        <div class="button-group">
            <button class="btn-check" onclick="checkMatches()">
                <span id="checkText">Check Finished Matches</span>
            </button>
            <button class="btn-remove" onclick="removeUrls()">
                <span id="removeText">Remove URLs</span>
            </button>
            <button class="btn-back" onclick="window.location.href='admin.html'">
                Back to Admin
            </button>
        </div>

        <div id="matchesList" class="matches-list"></div>
    </div>

    <script>
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
            status.style.display = 'block';
        }

        function hideStatus() {
            document.getElementById('status').style.display = 'none';
        }

        async function checkMatches() {
            const btn = document.querySelector('.btn-check');
            const text = document.getElementById('checkText');
            const originalText = text.textContent;
            
            btn.disabled = true;
            text.innerHTML = '<span class="loading"></span> Checking...';
            hideStatus();
            document.getElementById('matchesList').innerHTML = '';

            try {
                const response = await fetch('/api/admin/check-past-match-urls', {
                    credentials: 'include'
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to check matches');
                }

                if (data.count === 0) {
                    showStatus('✅ No finished matches with URLs found. Database is clean!', 'success');
                } else {
                    showStatus(`Found ${data.count} finished match(es) with URLs`, 'info');
                    displayMatches(data.matches);
                }
            } catch (error) {
                showStatus(`❌ Error: ${error.message}`, 'error');
            } finally {
                btn.disabled = false;
                text.textContent = originalText;
            }
        }

        async function removeUrls() {
            if (!confirm('Are you sure you want to remove URLs from all finished matches?')) {
                return;
            }

            const btn = document.querySelector('.btn-remove');
            const text = document.getElementById('removeText');
            const originalText = text.textContent;
            
            btn.disabled = true;
            text.innerHTML = '<span class="loading"></span> Removing...';
            hideStatus();

            try {
                const response = await fetch('/api/admin/remove-past-match-urls', {
                    method: 'POST',
                    credentials: 'include'
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to remove URLs');
                }

                if (data.removed_count === 0) {
                    showStatus('✅ No URLs to remove. Database is already clean!', 'success');
                } else {
                    showStatus(`✅ ${data.message}`, 'success');
                    displayMatches(data.matches, true);
                }
            } catch (error) {
                showStatus(`❌ Error: ${error.message}`, 'error');
            } finally {
                btn.disabled = false;
                text.textContent = originalText;
            }
        }

        function displayMatches(matches, removed = false) {
            const container = document.getElementById('matchesList');
            
            if (matches.length === 0) {
                container.innerHTML = '';
                return;
            }

            const html = matches.map(match => `
                <div class="match-card">
                    <div class="match-header">
                        ${match.home} vs ${match.away}
                    </div>
                    <div class="match-details">
                        📅 ${new Date(match.date).toLocaleString()}<br>
                        ⚽ Score: ${match.score}<br>
                        🔗 ${removed ? 'URL Removed' : 'Current URL'}: 
                        <span class="match-url">${removed ? match.url_removed : match.url}</span>
                    </div>
                </div>
            `).join('');

            container.innerHTML = html;
        }

        // Check on page load
        window.addEventListener('load', () => {
            checkMatches();
        });
    </script>
</body>
</html>
