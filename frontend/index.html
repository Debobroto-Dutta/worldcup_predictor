<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 Predictor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .nav-tabs {
            display: flex;
            background: #f5f5f5;
            border-bottom: 2px solid #ddd;
        }

        .nav-tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            background: #f5f5f5;
            border: none;
            font-size: 16px;
            transition: all 0.3s;
        }

        .nav-tab:hover {
            background: #e0e0e0;
        }

        .nav-tab.active {
            background: white;
            border-bottom: 3px solid #667eea;
            font-weight: bold;
        }

        .content {
            padding: 30px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .auth-form {
            max-width: 400px;
            margin: 0 auto;
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #6c757d;
            margin-top: 10px;
        }

        .match-card {
            background: #f9f9f9;
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            transition: transform 0.2s;
        }

        .match-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .match-teams {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 20px 0;
            font-size: 1.2em;
            font-weight: bold;
        }

        .team {
            flex: 1;
            text-align: center;
        }

        .vs {
            padding: 0 20px;
            color: #667eea;
        }

        .prediction-inputs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .score-input {
            width: 60px;
            padding: 10px;
            text-align: center;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 8px;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .leaderboard-table th,
        .leaderboard-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        .leaderboard-table th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: bold;
        }

        .leaderboard-table tr:hover {
            background: #f5f5f5;
        }

        .rank-1 {
            background: #ffd700 !important;
        }

        .rank-2 {
            background: #c0c0c0 !important;
        }

        .rank-3 {
            background: #cd7f32 !important;
        }

        .badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-success {
            background: #28a745;
            color: white;
        }

        .badge-warning {
            background: #ffc107;
            color: black;
        }

        .badge-danger {
            background: #dc3545;
            color: white;
        }

        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .hidden {
            display: none;
        }

        .user-info {
            text-align: center;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .user-info h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .points-display {
            font-size: 2em;
            font-weight: bold;
            color: #764ba2;
        }

        @media (max-width: 768px) {
            .match-teams {
                flex-direction: column;
                gap: 10px;
            }

            .vs {
                padding: 10px 0;
            }

            .nav-tab {
                font-size: 14px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚽ World Cup 2026 Predictor</h1>
            <p>Predict match winners and scorelines with your friends!</p>
        </header>

        <div class="nav-tabs">
            <button class="nav-tab active" onclick="showTab('login')">Login</button>
            <button class="nav-tab" onclick="showTab('matches')">Matches</button>
            <button class="nav-tab" onclick="showTab('predictions')">My Predictions</button>
            <button class="nav-tab" onclick="showTab('leaderboard')">Leaderboard</button>
        </div>

        <div class="content">
            <!-- Login/Register Tab -->
            <div id="login-tab" class="tab-content active">
                <div class="auth-form">
                    <h2 style="text-align: center; margin-bottom: 30px;">Login</h2>
                    <div id="login-message"></div>
                    <form id="login-form">
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" id="login-username" required>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="login-password" required>
                        </div>
                        <button type="submit" class="btn">Login</button>
                    </form>
                    <button class="btn btn-secondary" onclick="showRegisterForm()">Register New Account</button>
                </div>

                <div class="auth-form hidden" id="register-form-container">
                    <h2 style="text-align: center; margin-bottom: 30px;">Register</h2>
                    <div id="register-message"></div>
                    <form id="register-form">
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" id="register-username" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="register-email" required>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="register-password" required>
                        </div>
                        <button type="submit" class="btn">Register</button>
                    </form>
                    <button class="btn btn-secondary" onclick="showLoginForm()">Back to Login</button>
                </div>
            </div>

            <!-- Matches Tab -->
            <div id="matches-tab" class="tab-content">
                <div class="user-info hidden" id="user-info">
                    <h3>Welcome, <span id="username-display"></span>!</h3>
                    <div class="points-display">
                        <span id="points-display">0</span> Points
                    </div>
                    <button class="btn btn-secondary" onclick="logout()" style="max-width: 200px; margin: 10px auto;">Logout</button>
                </div>
                <h2>Upcoming Matches</h2>
                <div id="matches-list"></div>
            </div>

            <!-- My Predictions Tab -->
            <div id="predictions-tab" class="tab-content">
                <h2>My Predictions</h2>
                <div id="predictions-list"></div>
            </div>

            <!-- Leaderboard Tab -->
            <div id="leaderboard-tab" class="tab-content">
                <h2>🏆 Leaderboard</h2>
                <table class="leaderboard-table">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Username</th>
                            <th>Total Points</th>
                            <th>Correct Winners</th>
                            <th>Exact Scores</th>
                            <th>Predictions</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
